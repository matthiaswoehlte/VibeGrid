name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Check for e2e tests
        id: check_e2e
        run: |
          count=$(find tests/e2e -name "*.spec.ts" | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT
      - if: steps.check_e2e.outputs.count > 0
        run: npm ci
      - if: steps.check_e2e.outputs.count > 0
        run: npx playwright install --with-deps chromium
      - if: steps.check_e2e.outputs.count > 0
        run: npm run build
      - name: Run Playwright
        if: steps.check_e2e.outputs.count > 0
        run: npm run test:e2e
